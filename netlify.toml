# Netlify Configuration - Backend Only
# Frontend will be deployed separately to Vercel

[build]
  command = "npm install && npx prisma generate"
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
